<svg xmlns="http://www.w3.org/2000/svg" width="880" height="495" viewBox="0 0 880 495" role="img" aria-label="InterviewOps architecture diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="880" height="495" rx="28" fill="url(#bg)"/>
  <text x="42" y="54" fill="#0f172a" font-family="Arial, sans-serif" font-size="28" font-weight="900">InterviewOps System Architecture</text>
  <text x="42" y="82" fill="#64748b" font-family="Arial, sans-serif" font-size="15" font-weight="700">Cloud Run / Firebase / Gemini API で、登録・模擬面接・AI分析・改善ログ保存を実行</text>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect x="42" y="128" width="150" height="86" rx="18" fill="#ffffff"/>
    <text x="117" y="162" text-anchor="middle" fill="#0f172a" font-size="19" font-weight="900">User</text>
    <text x="117" y="188" text-anchor="middle" fill="#64748b" font-size="13" font-weight="700">Browser</text>

    <rect x="268" y="112" width="210" height="118" rx="22" fill="#ffffff"/>
    <text x="373" y="148" text-anchor="middle" fill="#0f172a" font-size="20" font-weight="900">Next.js App</text>
    <text x="373" y="173" text-anchor="middle" fill="#64748b" font-size="13" font-weight="700">Cloud Run</text>
    <text x="373" y="198" text-anchor="middle" fill="#64748b" font-size="13" font-weight="700">UI + API Routes</text>

    <rect x="574" y="112" width="128" height="76" rx="18" fill="#fff7ed"/>
    <text x="638" y="145" text-anchor="middle" fill="#9a3412" font-size="17" font-weight="900">Firebase</text>
    <text x="638" y="168" text-anchor="middle" fill="#9a3412" font-size="12" font-weight="800">Auth</text>

    <rect x="574" y="216" width="128" height="76" rx="18" fill="#fff7ed"/>
    <text x="638" y="249" text-anchor="middle" fill="#9a3412" font-size="17" font-weight="900">Firestore</text>
    <text x="638" y="272" text-anchor="middle" fill="#9a3412" font-size="12" font-weight="800">Companies / Attempts</text>

    <rect x="574" y="320" width="128" height="76" rx="18" fill="#ecfeff"/>
    <text x="638" y="353" text-anchor="middle" fill="#0e7490" font-size="17" font-weight="900">Gemini API</text>
    <text x="638" y="376" text-anchor="middle" fill="#0e7490" font-size="12" font-weight="800">Draft / Analyze</text>
  </g>

  <g stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <path d="M192 171 H260"/>
    <path d="M478 150 H566"/>
    <path d="M478 252 H566"/>
    <path d="M478 352 H566"/>
  </g>

  <g font-family="Arial, sans-serif" font-weight="800" font-size="12" fill="#475569">
    <text x="203" y="156">HTTPS</text>
    <text x="491" y="136">ID Token</text>
    <text x="486" y="238">Admin SDK</text>
    <text x="498" y="338">Server API</text>
  </g>

  <g transform="translate(42 318)" font-family="Arial, sans-serif">
    <rect width="438" height="116" rx="20" fill="#0f172a"/>
    <text x="24" y="34" fill="#ffffff" font-size="17" font-weight="900">Interview Pipeline</text>
    <text x="24" y="62" fill="#cbd5e1" font-size="13" font-weight="700">1. AI面接官設定 → 2. 質問/理想回答登録 → 3. 模擬面接</text>
    <text x="24" y="84" fill="#cbd5e1" font-size="13" font-weight="700">4. AI分析 → 5. 改善ログ保存</text>
    <text x="24" y="106" fill="#93c5fd" font-size="12" font-weight="800">Security: Firebase Auth + ALLOWED_EMAILS + Env Vars</text>
  </g>
</svg>
